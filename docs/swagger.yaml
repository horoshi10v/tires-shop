basePath: /api/v1
definitions:
  domain.AuthRequestDTO:
    properties:
      init_data:
        description: The raw string from window.Telegram.WebApp.initData
        type: string
    required:
    - init_data
    type: object
  domain.AuthResponseDTO:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  domain.CreateLotDTO:
    properties:
      brand:
        type: string
      condition:
        enum:
        - NEW
        - USED
        type: string
      defects:
        type: string
      initial_quantity:
        type: integer
      model:
        type: string
      params:
        $ref: '#/definitions/domain.LotParams'
      photos:
        description: URLs to images
        items:
          type: string
        type: array
      purchase_price:
        type: number
      sell_price:
        type: number
      type:
        enum:
        - TIRE
        - RIM
        type: string
      warehouse_id:
        type: string
    required:
    - brand
    - condition
    - initial_quantity
    - purchase_price
    - sell_price
    - type
    - warehouse_id
    type: object
  domain.CreateOrderDTO:
    properties:
      customer_name:
        type: string
      customer_phone:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.OrderItemDTO'
        minItems: 1
        type: array
    required:
    - customer_name
    - customer_phone
    - items
    type: object
  domain.CreateTransferDTO:
    properties:
      comment:
        type: string
      from_warehouse_id:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.TransferItemDTO'
        minItems: 1
        type: array
      to_warehouse_id:
        type: string
    required:
    - from_warehouse_id
    - items
    - to_warehouse_id
    type: object
  domain.CreateWarehouseDTO:
    properties:
      location:
        type: string
      name:
        minLength: 3
        type: string
    required:
    - location
    - name
    type: object
  domain.LotInternalResponse:
    properties:
      brand:
        type: string
      condition:
        type: string
      current_quantity:
        type: integer
      defects:
        type: string
      id:
        type: string
      initial_quantity:
        type: integer
      model:
        type: string
      params:
        $ref: '#/definitions/domain.LotParams'
      photos:
        items:
          type: string
        type: array
      purchase_price:
        type: number
      sell_price:
        type: number
      status:
        type: string
      type:
        type: string
      warehouse_id:
        type: string
    type: object
  domain.LotParams:
    properties:
      anti_puncture:
        type: boolean
      diameter:
        type: integer
      is_run_flat:
        type: boolean
      is_spiked:
        type: boolean
      profile:
        type: integer
      season:
        description: SUMMER, WINTER, ALL_SEASON
        type: string
      width:
        type: integer
    type: object
  domain.LotPublicResponse:
    properties:
      brand:
        type: string
      condition:
        type: string
      current_quantity:
        type: integer
      defects:
        type: string
      id:
        type: string
      model:
        type: string
      params:
        $ref: '#/definitions/domain.LotParams'
      photos:
        items:
          type: string
        type: array
      sell_price:
        type: number
      type:
        type: string
    type: object
  domain.OrderItemDTO:
    properties:
      lot_id:
        type: string
      quantity:
        type: integer
    required:
    - lot_id
    - quantity
    type: object
  domain.OrderItemResponse:
    properties:
      lot_id:
        type: string
      price:
        type: number
      quantity:
        type: integer
      total:
        type: number
    type: object
  domain.OrderResponse:
    properties:
      created_at:
        type: string
      customer_name:
        type: string
      customer_phone:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.OrderItemResponse'
        type: array
      status:
        type: string
      total_amount:
        type: number
    type: object
  domain.PnLReport:
    properties:
      by_warehouse:
        items:
          $ref: '#/definitions/domain.WarehousePnL'
        type: array
      total_cogs:
        type: number
      total_items_sold:
        type: integer
      total_profit:
        type: number
      total_revenue:
        type: number
    type: object
  domain.TransferItemDTO:
    properties:
      lot_id:
        type: string
      quantity:
        type: integer
    required:
    - lot_id
    - quantity
    type: object
  domain.TransferItemResponse:
    properties:
      id:
        type: string
      quantity:
        type: integer
      source_lot_id:
        type: string
    type: object
  domain.TransferResponse:
    properties:
      accepted_by:
        type: string
      comment:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      from_warehouse_id:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.TransferItemResponse'
        type: array
      status:
        type: string
      to_warehouse_id:
        type: string
    type: object
  domain.UpdateLotDTO:
    properties:
      brand:
        type: string
      condition:
        enum:
        - NEW
        - USED
        type: string
      defects:
        type: string
      model:
        type: string
      params:
        $ref: '#/definitions/domain.LotParams'
      photos:
        items:
          type: string
        type: array
      purchase_price:
        type: number
      sell_price:
        type: number
      type:
        enum:
        - TIRE
        - RIM
        type: string
      warehouse_id:
        description: 'Optional: Move lot to another warehouse (inventory implication?)'
        type: string
    type: object
  domain.UpdateOrderStatusDTO:
    properties:
      comment:
        type: string
      status:
        enum:
        - NEW
        - PREPAYMENT
        - DONE
        - CANCELLED
        type: string
    required:
    - status
    type: object
  domain.UpdateWarehouseDTO:
    properties:
      is_active:
        type: boolean
      location:
        type: string
      name:
        minLength: 3
        type: string
    required:
    - location
    - name
    type: object
  domain.User:
    properties:
      first_name:
        type: string
      id:
        type: string
      role:
        $ref: '#/definitions/domain.UserRole'
      telegram_id:
        type: integer
      username:
        type: string
    type: object
  domain.UserRole:
    enum:
    - ADMIN
    - STAFF
    - BUYER
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleStaff
    - RoleBuyer
  domain.Warehouse:
    properties:
      id:
        type: string
      is_active:
        type: boolean
      location:
        type: string
      name:
        type: string
    type: object
  domain.WarehousePnL:
    properties:
      cogs:
        type: number
      items_sold:
        type: integer
      profit:
        type: number
      revenue:
        type: number
      warehouse_name:
        type: string
    type: object
  v1.DeletePhotoRequest:
    properties:
      url:
        type: string
    required:
    - url
    type: object
host: localhost:8083
info:
  contact:
    name: Valentyn Khoroshylov
  description: This is a REST API for managing a tires and rims store/warehouse.
  title: Tires Shop CRM API
  version: "1.0"
paths:
  /admin/exports/inventory:
    get:
      parameters:
      - description: Search by brand or model
        in: query
        name: search
        type: string
      - description: Filter by brand name
        in: query
        name: brand
        type: string
      - description: Filter by type (TIRE, RIM)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: URL of the Google Sheet
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Export Inventory to Google Sheets
      tags:
      - exports
  /admin/exports/pnl:
    get:
      parameters:
      - description: Start Date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End Date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Filter by Warehouse ID
        in: query
        name: warehouse_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: URL of the Google Sheet
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Export P&L to Google Sheets
      tags:
      - exports
  /admin/warehouses:
    post:
      consumes:
      - application/json
      parameters:
      - description: Warehouse details
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/domain.CreateWarehouseDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - RoleAuth: []
      summary: Create Warehouse
      tags:
      - warehouses
  /admin/warehouses/{id}:
    delete:
      parameters:
      - description: Warehouse ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Delete Warehouse
      tags:
      - warehouses
    put:
      consumes:
      - application/json
      parameters:
      - description: Warehouse ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated details
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateWarehouseDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Update Warehouse
      tags:
      - warehouses
  /auth/telegram:
    post:
      consumes:
      - application/json
      description: Validates Telegram initData and returns a JWT token.
      parameters:
      - description: Telegram initData
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/domain.AuthRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AuthResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login via Telegram Mini App
      tags:
      - auth
  /lots:
    get:
      description: Get active lots. Purchase price and archive data are hidden.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Search by brand or model
        in: query
        name: search
        type: string
      - description: Filter by brand name
        in: query
        name: brand
        type: string
      - description: Filter by type (TIRE, RIM)
        in: query
        name: type
        type: string
      - description: Filter by width (mm)
        in: query
        name: width
        type: integer
      - description: Filter by profile (%)
        in: query
        name: profile
        type: integer
      - description: Filter by diameter (R)
        in: query
        name: diameter
        type: integer
      - description: Filter by season
        in: query
        name: season
        type: string
      - description: Filter by model name
        in: query
        name: model
        type: string
      - description: Filter by condition (NEW/USED)
        in: query
        name: condition
        type: string
      - description: Filter by run flat parameter
        in: query
        name: is_run_flat
        type: boolean
      - description: Filter by spiked parameter
        in: query
        name: is_spiked
        type: boolean
      - description: Filter by anti puncture parameter
        in: query
        name: anti_puncture
        type: boolean
      - description: Filter by exact sell price
        in: query
        name: sell_price
        type: number
      - description: Filter by exact quantity
        in: query
        name: current_quantity
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.LotPublicResponse'
            type: array
      summary: List available lots (Public)
      tags:
      - lots-public
  /orders:
    get:
      description: Get a paginated list of orders placed by the current user.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.OrderResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: My Orders History
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: Place a new order with customer details and tire items.
      parameters:
      - description: Order details
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/domain.CreateOrderDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Create a new order
      tags:
      - orders
  /reports/pnl:
    get:
      consumes:
      - application/json
      description: Calculates total revenue, COGS, and profit based on DONE orders.
      parameters:
      - description: Start Date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End Date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Filter by Warehouse ID
        in: query
        name: warehouse_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.PnLReport'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Get Profit & Loss Report
      tags:
      - reports
  /staff/lots:
    get:
      description: Get lots including sensitive financial data and archives.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Search by brand or model
        in: query
        name: search
        type: string
      - description: Filter by brand name
        in: query
        name: brand
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by type (TIRE, RIM)
        in: query
        name: type
        type: string
      - description: Filter by width (mm)
        in: query
        name: width
        type: integer
      - description: Filter by profile (%)
        in: query
        name: profile
        type: integer
      - description: Filter by diameter (R)
        in: query
        name: diameter
        type: integer
      - description: Filter by season
        in: query
        name: season
        type: string
      - description: Filter by model name
        in: query
        name: model
        type: string
      - description: Filter by condition (NEW/USED)
        in: query
        name: condition
        type: string
      - description: Filter by run flat parameter
        in: query
        name: is_run_flat
        type: boolean
      - description: Filter by spiked parameter
        in: query
        name: is_spiked
        type: boolean
      - description: Filter by anti puncture parameter
        in: query
        name: anti_puncture
        type: boolean
      - description: Filter by exact sell price
        in: query
        name: sell_price
        type: number
      - description: Filter by exact quantity
        in: query
        name: current_quantity
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.LotInternalResponse'
            type: array
      security:
      - RoleAuth: []
      summary: List all lots (Internal)
      tags:
      - lots-staff
    post:
      consumes:
      - application/json
      description: Add a new lot to the inventory.
      parameters:
      - description: Lot details
        in: body
        name: lot
        required: true
        schema:
          $ref: '#/definitions/domain.CreateLotDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - RoleAuth: []
      summary: Create a new lot
      tags:
      - lots-staff
  /staff/lots/{id}:
    delete:
      description: Soft delete a lot.
      parameters:
      - description: Lot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Delete a lot
      tags:
      - lots-staff
    put:
      consumes:
      - application/json
      description: Update details of an existing lot.
      parameters:
      - description: Lot ID
        in: path
        name: id
        required: true
        type: string
      - description: Lot update details
        in: body
        name: lot
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateLotDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Update a lot
      tags:
      - lots-staff
  /staff/lots/{id}/qr:
    get:
      description: Generates and returns a PNG image of a QR code containing the Lot
        ID.
      parameters:
      - description: Lot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/png
      responses:
        "200":
          description: PNG Image
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Get Lot QR Code
      tags:
      - lots-admin
  /staff/lots/photo:
    delete:
      consumes:
      - application/json
      description: Removes the image from MinIO using its public URL.
      parameters:
      - description: Public URL of the photo to delete
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.DeletePhotoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Delete a photo
      tags:
      - media
  /staff/lots/upload:
    post:
      consumes:
      - multipart/form-data
      description: Compresses the image to JPEG, uploads to MinIO, and returns the
        public URL.
      parameters:
      - description: Image file to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Returns the public URL of the uploaded image
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Upload a photo
      tags:
      - media
  /staff/orders:
    get:
      description: Get a paginated list of orders, filterable by status or customer.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Search by customer name or phone
        in: query
        name: customer
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.OrderResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: List Orders
      tags:
      - orders-staff
  /staff/orders/{id}/status:
    put:
      consumes:
      - application/json
      description: Change the status of an existing order (e.g., NEW, PREPAYMENT,
        DONE, CANCELLED).
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: New status and comment
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateOrderStatusDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - RoleAuth: []
      summary: Update Order Status
      tags:
      - orders
  /staff/transfers:
    get:
      description: Get paginated list of transfers.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by source warehouse
        in: query
        name: from_warehouse_id
        type: string
      - description: Filter by destination warehouse
        in: query
        name: to_warehouse_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.TransferResponse'
