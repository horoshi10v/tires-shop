<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMA Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; word-wrap: break-word; background: #222; color: #0f0; }
        button { padding: 10px; background: #0f0; color: #000; border: none; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>
<h2>Твоя initData:</h2>
<div id="initDataBox">Загрузка...</div>

<button onclick="copyData()">Скопировать</button>

<script>
    // Инициализируем WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();

    // Достаем строку initData
    const initData = tg.initData;
    document.getElementById("initDataBox").innerText = initData || "initData пуста (открой внутри ТГ)";

    function copyData() {
        navigator.clipboard.writeText(initData);
        alert("Скопировано!");
    }
</script>
</body>
</html>
